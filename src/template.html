<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title><%= htmlWebpackPlugin.options.title %></title>
    </head>
    <body>
        <div id="app" class="app">
            <header id="header" class="header">
                <label for="search"></label>
                <input title="search" class="header__input" type="text" name="" id="search" />
                <button type="button" class="header__btn btn" id="searchBtn">Search</button>
            </header>
            <div class="favourite">
                <h3 class="favourite__headline">Favourite Meals</h3>
                <ul class="favourite__list">
                    <li id="put-pic-one">
                        <span>Meal 1</span>
                    </li>
                    <li id="put-pic-two">
                        <span>Meal 2</span>
                    </li>
                    <li id="put-pic-three">
                        <span>Meal 3</span>
                    </li>
                </ul>
            </div>
            <div class="meals" id="meals"></div>
        </div>
    </body>
</html>
